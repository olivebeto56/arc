name: arc_app
description: ARC — AI Sport Monitor companion app for Flutter.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_blue_plus: ^1.32.0
  flutter_riverpod: ^2.5.1
  fl_chart: ^0.68.0
  permission_handler: ^11.3.1
  # Location/GPS — Baseflow themselves recommend geolocator over
  # `permission_handler.Permission.locationWhenInUse` due to documented
  # iOS divergence between the two plugins. See:
  # https://github.com/Baseflow/flutter-permission-handler/issues/1391
  geolocator: ^13.0.2
  flutter_svg: ^2.0.10
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: false

  assets:
    - assets/logos/
    - assets/icons/

  # Inter (200–700) + JetBrains Mono (400, 500). Per the handoff, fonts ship
  # locally — do NOT use the google_fonts package. Drop the .ttf files into
  # assets/fonts/ before running the app. Sources:
  #   https://fonts.google.com/specimen/Inter
  #   https://fonts.google.com/specimen/JetBrains+Mono
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Inter-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
